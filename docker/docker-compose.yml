services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: server
    ports:
      - "8120:8120"
    environment:
      AGENTSMITH_DB_URL: "mysql+pymysql://root:root@host.docker.internal:3306/agent_smith"
      AGENTSMITH_STATIC_DIR: "/app/static"
    restart: unless-stopped

  collector:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: collector
    volumes:
      - "${LOGS_DIR:-/mnt/e/Documents/github/cjml-cheap-weixiu/logs}:/data/logs"
    command: >
      uv run python -m agentsmith_collector
      --logs-dir /data/logs
      --server-url http://server:8120
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped
