services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agent_smith
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: server
    ports:
      - "18900:18900"
    environment:
      AGENTSMITH_DB_URL: "mysql+pymysql://root:root@mysql:3306/agent_smith"
      AGENTSMITH_STATIC_DIR: "/app/static"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  collector:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: collector
    volumes:
      - "${LOGS_DIR:-/mnt/e/Documents/github/cjml-cheap-weixiu/logs}:/data/logs"
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped

volumes:
  mysql_data:
